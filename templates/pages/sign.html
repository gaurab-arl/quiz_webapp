{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up — KCC Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/root.css' %}">
    <link rel="stylesheet" href="{% static 'css/sign.css' %}">
</head>

<body class="h-screen overflow-hidden">
    <div class="h-screen grid lg:grid-cols-2">

        <!-- LEFT: dark brand panel (fixed, does not scroll) -->
        <div class="hidden lg:flex flex-col justify-between bg-[var(--ink)] text-[var(--paper)] px-12 py-10 h-screen sticky top-0">
            <a href="#" class="font-display font-bold text-xl tracking-tight">KCC <span class="text-[#3B2FFF]">Quiz</span></a>

            <div>
                <p class="font-display text-xs tracking-[0.3em] text-[#8A8A85] mb-6">JOIN FOR FREE</p>
                <h1 class="font-display font-bold text-5xl leading-[0.95] tracking-tight max-w-md">
                    Quizzes that keep students <em class="italic font-normal" style="color:var(--accent)">sharp.</em>
                </h1>
            </div>

        </div>

        <!-- RIGHT: form (scrolls independently) -->
        <div class="flex flex-col [justify-content:safe_center] px-6 sm:px-16 py-16 h-screen overflow-y-auto">
            <div class="max-w-sm w-full mx-auto">
                <a href="#" class="lg:hidden font-display font-bold text-xl tracking-tight mb-10 block">KCC Quiz</a>

                <h2 class="font-display font-bold text-3xl sm:text-4xl tracking-tight mb-2">Create your account</h2>
                <p class="text-[var(--mute)] mb-8">Already have one? <a href="{% url 'login' %}"
                        class="text-[var(--ink)] font-semibold underline underline-offset-4 decoration-[var(--line)] hover:decoration-[var(--accent)]">Log
                        in →</a></p>

                <form id="signup-form" method="post" novalidate>
                    {% csrf_token %}
                    <div id="form-alert" class="hidden mb-5 text-sm font-medium px-4 py-3 rounded-xl border"></div>

                    <div class="space-y-5">

                        <!-- ROLE SELECTOR -->
                        <div>
                            <label class="block text-sm font-medium mb-2">I am a</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <input type="radio" name="role" id="role-student" value="student"
                                        class="role-input peer hidden" checked />
                                    <label for="role-student"
                                        class="role-label block text-center font-display font-semibold text-sm px-4 py-3 rounded-xl border border-[var(--line)] cursor-pointer transition-colors peer-checked:border-[var(--ink)] peer-checked:bg-[var(--ink)] peer-checked:text-[var(--paper)]">
                                        Student
                                    </label>
                                </div>
                                <div>
                                    <input type="radio" name="role" id="role-institution" value="institution"
                                        class="role-input peer hidden" />
                                    <label for="role-institution"
                                        class="role-label block text-center font-display font-semibold text-sm px-4 py-3 rounded-xl border border-[var(--line)] cursor-pointer transition-colors peer-checked:border-[var(--ink)] peer-checked:bg-[var(--ink)] peer-checked:text-[var(--paper)]">
                                        Institution / Admin
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- COMMON: full name / institution name -->
                        <div>
                            <label id="name-label" class="block text-sm font-medium mb-2">Full name</label>
                            <input type="text" name="full_name" id="full_name" placeholder="Gaurab Aryal" required
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                            <p class="field-error hidden text-xs text-red-600 mt-1"></p>
                        </div>

                        <!-- INSTITUTION/ADMIN ONLY: contact person -->
                        <div data-role-field="institution" class="hidden">
                            <label class="block text-sm font-medium mb-2">Contact person</label>
                            <input type="text" name="contact_person" placeholder="Person we should reach"
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                        </div>

                        <!-- INSTITUTION/ADMIN ONLY: institution type -->
                        <div data-role-field="institution" class="hidden">
                            <label class="block text-sm font-medium mb-2">Institution type</label>
                            <select name="institution_type"
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base">
                                <option value="">Select type</option>
                                <option value="school">School</option>
                                <option value="college">College</option>
                                <option value="entrance_center">Entrance prep center</option>
                                <option value="other">Other</option>
                            </select>
                        </div>

                        <!-- STUDENT ONLY: grade / level -->
                        <div data-role-field="student">
                            <label class="block text-sm font-medium mb-2">Class / level</label>
                            <select name="grade_level"
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base">
                                <option value="">Select your level</option>
                                <option value="grade_9">Grade 9</option>
                                <option value="grade_10">Grade 10</option>
                                <option value="grade_11">Grade 11</option>
                                <option value="grade_12">Grade 12</option>
                                <option value="bachelors">Bachelor's</option>
                                <option value="entrance_prep">Entrance preparation</option>
                            </select>
                        </div>

                        <!-- EMAIL -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input type="email" name="email" id="email" placeholder="you@school.edu" required
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                            <p class="field-error hidden text-xs text-red-600 mt-1"></p>
                        </div>

                        <!-- PHONE -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Phone number</label>
                            <input type="tel" name="phone" id="phone" placeholder="98XXXXXXXX"
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                            <p class="field-error hidden text-xs text-red-600 mt-1"></p>
                        </div>

                        <!-- PASSWORD -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Password</label>
                            <div class="relative">
                                <input type="password" name="password" id="password"
                                    placeholder="At least 8 characters" required
                                    class="w-full px-4 py-3.5 pr-12 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                                <button type="button" id="toggle-password"
                                    class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-semibold text-[var(--mute)]">Show</button>
                            </div>
                            <p class="field-error hidden text-xs text-red-600 mt-1"></p>
                        </div>

                        <!-- CONFIRM PASSWORD -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Confirm password</label>
                            <input type="password" name="confirm_password" id="confirm_password"
                                placeholder="Re-enter your password" required
                                class="w-full px-4 py-3.5 rounded-xl border border-[var(--line)] bg-white text-base placeholder:text-[var(--mute)]" />
                            <p class="field-error hidden text-xs text-red-600 mt-1"></p>
                        </div>

                        <label class="flex items-start gap-2.5 text-sm text-[var(--mute)] pt-1">
                            <input type="checkbox" name="agree_terms" id="agree_terms"
                                class="w-4 h-4 mt-0.5 rounded border-[var(--line)] accent-[var(--accent)]" />
                            <span>I agree to the <a href="#" class="underline hover:text-[var(--ink)]">Terms</a> and
                                <a href="#" class="underline hover:text-[var(--ink)]">Privacy Policy</a></span>
                        </label>
                        <p id="terms-error" class="field-error hidden text-xs text-red-600"></p>

                        <button type="submit" id="submit-btn"
                            class="w-full font-display font-semibold text-base px-8 py-4 rounded-full bg-[var(--ink)] text-[var(--paper)] hover:bg-[var(--accent)] transition-colors mt-2 disabled:opacity-60 disabled:cursor-not-allowed">
                            <span id="submit-label">Create account →</span>
                        </button>
                    </div>
                </form>

                <div class="flex items-center gap-4 my-8">
                    <span class="h-px flex-1 bg-[var(--line)]"></span>
                    <span class="text-xs text-[var(--mute)]">OR</span>
                    <span class="h-px flex-1 bg-[var(--line)]"></span>
                </div>

                <button
                    class="w-full flex items-center justify-center gap-3 font-display font-semibold text-base px-8 py-4 rounded-full border border-[var(--line)] hover:border-[var(--ink)] transition-colors">
                    <svg width="18" height="18" viewBox="0 0 24 24">
                        <path fill="#4285F4"
                            d="M23.5 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58v3h3.88c2.27-2.09 3.55-5.17 3.55-8.82z" />
                        <path fill="#34A853"
                            d="M12 24c3.24 0 5.95-1.08 7.93-2.91l-3.88-3c-1.08.72-2.45 1.16-4.05 1.16-3.11 0-5.75-2.1-6.69-4.92H1.3v3.09C3.26 21.3 7.31 24 12 24z" />
                        <path fill="#FBBC05"
                            d="M5.31 14.33c-.24-.72-.38-1.49-.38-2.33s.14-1.61.38-2.33V6.58H1.3A11.98 11.98 0 000 12c0 1.93.46 3.76 1.3 5.42l4.01-3.09z" />
                        <path fill="#EA4335"
                            d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.95 1.19 15.24 0 12 0 7.31 0 3.26 2.7 1.3 6.58l4.01 3.09C6.25 6.85 8.89 4.75 12 4.75z" />
                    </svg>
                    Continue with Google
                </button>
            </div>
        </div>
    </div>

    <script src="{% static 'js/sign.js' %}"></script>
</body>

</html>
